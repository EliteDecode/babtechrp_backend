

name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            cd /home/babtech/babtechrp_backend

            echo "--- Pulling latest code ---"
            git clean -fd
            git pull origin master

            echo "--- Installing dependencies ---"
            npm ci --omit=dev

            echo "--- Building app ---"
            npm run build

            echo "--- Restarting PM2 ---"
            pm2 restart babtechrp-backend || pm2 start dist/src/server.js --name babtechrp-backend --max-memory-restart 512M

            pm2 save

            echo "--- Deploy complete ---"
